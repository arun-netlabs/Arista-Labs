! PE-1 Configuration
! Provider Edge Router 1
! Loopback0: 1.1.1.1/32
! OSPF + LDP + VPLS
!
hostname PE-1
!
ip routing
!
spanning-tree mode mstp
!
vlan 10
   name CUSTOMER-VLAN
!
interface Loopback0
   description Router-ID / LDP Transport
   ip address 1.1.1.1/32
!
interface Ethernet1
   description To P1 Eth1 (10.0.10.0/30)
   no switchport
   ip address 10.0.10.1/30
   mpls ip
!
interface Ethernet2
   description To P2 Eth1 (10.0.20.0/30)
   no switchport
   ip address 10.0.20.1/30
   mpls ip
!
interface Ethernet8
   description To CE-1 Eth1 (VLAN 10 Access)
   switchport mode trunk
   switchport trunk allowed vlan 10
!
router ospf 1
   router-id 1.1.1.1
   network 1.1.1.1/32 area 0.0.0.0
   network 10.0.10.0/30 area 0.0.0.0
   network 10.0.20.0/30 area 0.0.0.0
   max-lsa 12000
!
mpls ip
!
mpls ldp
   router-id interface Loopback0
   transport-address interface Loopback0
   no shutdown
   !
   pseudowires
      pseudowire PE2
         neighbor 4.4.4.4
         pseudowire-id 10
         mtu 1300
         control-word
!     
router vpls
   vpls VPLS-10
      vlan 10
      !
      pseudowire ldp VLAN10 split-horizon
         pseudowire PE2
!
end
