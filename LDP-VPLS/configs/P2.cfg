! P2 Configuration
! Provider Core Router 2
! Loopback0: 3.3.3.3/32
! OSPF + LDP (Transit LSR)
!
hostname P2
!
ip routing
!
spanning-tree mode mstp
!
interface Loopback0
   description Router-ID / LDP Transport
   ip address 3.3.3.3/32
!
interface Ethernet1
   description To PE-1 Eth2 (10.0.20.0/30)
   no switchport
   ip address 10.0.20.2/30
   mpls ip
!
interface Ethernet2
   description To PE-2 Eth2 (10.0.40.0/30)
   no switchport
   ip address 10.0.40.1/30
   mpls ip
!
router ospf 1
   router-id 3.3.3.3
   network 3.3.3.3/32 area 0.0.0.0
   network 10.0.20.0/30 area 0.0.0.0
   network 10.0.40.0/30 area 0.0.0.0
   max-lsa 12000
!
mpls ip
!
mpls ldp
   router-id 3.3.3.3
   transport-address interface Loopback0
   no shutdown
!
router general
   control-plane
      allow-vrfs default
!
end
