! P1 Configuration
! Provider Core Router 1
! Loopback0: 2.2.2.2/32
! OSPF + LDP (Transit LSR)
!
hostname P1
!
ip routing
!
spanning-tree mode mstp
!
interface Loopback0
   description Router-ID / LDP Transport
   ip address 2.2.2.2/32
!
interface Ethernet1
   description To PE-1 Eth1 (10.0.10.0/30)
   no switchport
   ip address 10.0.10.2/30
   mpls ip
!
interface Ethernet2
   description To PE-2 Eth1 (10.0.30.0/30)
   no switchport
   ip address 10.0.30.1/30
   mpls ip
!
router ospf 1
   router-id 2.2.2.2
   network 2.2.2.2/32 area 0.0.0.0
   network 10.0.10.0/30 area 0.0.0.0
   network 10.0.30.0/30 area 0.0.0.0
   max-lsa 12000
!
mpls ip
!
mpls ldp
   router-id 2.2.2.2
   transport-address interface Loopback0
   no shutdown
!
router general
   control-plane
      allow-vrfs default
!
end
