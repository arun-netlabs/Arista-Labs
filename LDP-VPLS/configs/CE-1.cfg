! CE-1 Configuration
! Customer Edge Router - Site A
! LAN Subnet: 172.16.10.0/24
!
hostname CE-1
!
spanning-tree mode mstp
!
vlan 10
   name CUSTOMER-LAN
!
interface Ethernet1
   description To PE-1 Eth8 (Tagged VLAN 10)
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Vlan10
   description Customer LAN
   ip address 172.16.10.10/24
!
ip routing
!
end
