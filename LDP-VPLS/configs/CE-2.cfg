! CE-2 Configuration
! Customer Edge Router - Site B
! LAN Subnet: 172.16.10.0/24
!
hostname CE-2
!
spanning-tree mode mstp
!
vlan 10
   name CUSTOMER-LAN
!
interface Ethernet1
   description To PE-2 Eth8 (Tagged VLAN 10)
   switchport mode trunk
   switchport trunk allowed vlan 10
!
interface Vlan10
   description Customer LAN
   ip address 172.16.10.20/24
!
ip routing
!
end
