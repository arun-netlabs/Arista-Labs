! PE-2 Configuration
! Provider Edge Router 2
! Loopback0: 4.4.4.4/32
! OSPF + LDP + VPLS
!
hostname PE-2
!
ip routing
!
spanning-tree mode mstp
!
vlan 10
   name CUSTOMER-VLAN
!
interface Loopback0
   description Router-ID / LDP Transport
   ip address 4.4.4.4/32
!
interface Ethernet1
   description To P1 Eth2 (10.0.30.0/30)
   no switchport
   ip address 10.0.30.2/30
   mpls ip
!
interface Ethernet2
   description To P2 Eth2 (10.0.40.0/30)
   no switchport
   ip address 10.0.40.2/30
   mpls ip
!
interface Ethernet8
   description To CE-2 Eth1 (VLAN 10 Access)
   switchport mode trunk
   switchport trunk allowed vlan 10
!
router ospf 1
   router-id 4.4.4.4
   network 4.4.4.4/32 area 0.0.0.0
   network 10.0.30.0/30 area 0.0.0.0
   network 10.0.40.0/30 area 0.0.0.0
   max-lsa 12000
!
mpls ip
!
mpls ldp
   router-id interface Loopback0
   transport-address interface Loopback0
   no shutdown
   !
   pseudowires
      pseudowire PE1
         neighbor 1.1.1.1
         pseudowire-id 10
         mtu 1300
         control-word
!         
router vpls
   vpls VPLS-10
      vlan 10
      !
      pseudowire ldp VLAN10 split-horizon
         pseudowire PE1
!
end
